artifacts:
  - id: "risk_register"
    name: "Risk Management Register"
    article: "Art. 9"
    description: "Risk management system documentation as required by Article 9"
    files:
      - "compliance/risk_register.yaml"
      - "compliance/risk_register.yml"
      - "compliance/risk_management.yaml"
      - "compliance/risk_management.yml"
      - "risk_register.yaml"
      - "risk_register.yml"
  - id: "dataset_card"
    name: "Dataset Documentation Card"
    article: "Art. 10"
    description: "Data governance documentation including provenance, collection method, licensing, and bias information"
    files:
      - "data/dataset_card.json"
      - "data/dataset_card.yaml"
      - "data/dataset_card.yml"
      - "dataset_card.json"
      - "dataset_card.yaml"
      - "dataset_card.yml"
      - "data/dataset.json"
      - "dataset.json"
  - id: "model_card"
    name: "Model Technical Documentation"
    article: "Art. 11 / Annex IV"
    description: "Model technical documentation including architecture, training data references, evaluation metrics, and limitations"
    files:
      - "model/model_card.json"
      - "model/model_card.yaml"
      - "model/model_card.yml"
      - "model_card.json"
      - "model_card.yaml"
      - "model_card.yml"
      - "model/model.json"
      - "model.json"
