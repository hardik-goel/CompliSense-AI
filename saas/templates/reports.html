<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Reports - CompliSense-AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f14;
            --card-bg: #1a1a22;
            --text-primary: #e8e8ed;
            --text-muted: #8b8b9a;
            --accent: #6d7eea;
            --border-color: #2d2d3a;
        }
        body { background: var(--bg-dark); color: var(--text-primary); }
        .header-dark { background: linear-gradient(135deg, #2d2d3a 0%, #1a1a22 100%); border-bottom: 1px solid var(--border-color); }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); }
        .form-control, .form-select { background: var(--card-bg); border-color: var(--border-color); color: var(--text-primary); }
        .table-dark { --bs-table-bg: var(--card-bg); --bs-table-border-color: var(--border-color); color: var(--text-primary); }
        .btn-close { filter: invert(1); }
    </style>
</head>
<body>
    <header class="header-dark py-3 mb-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <a href="/dashboard" class="text-decoration-none text-white">
                    <i class="fas fa-robot me-2"></i>CompliSense-AI
                </a>
                <a href="/dashboard" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left me-1"></i>Dashboard</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="mb-4"><i class="fas fa-chart-bar me-2"></i>Compliance Reports</h2>

        <!-- Project -> Scan -> Chart type -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">Select Report</h5>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small">Project</label>
                        <select class="form-select" id="reportProjectSelect" onchange="loadReportScans()">
                            <option value="">-- Select project --</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small">Scan</label>
                        <select class="form-select" id="reportScanSelect" onchange="updateReportChart(); loadReportActions();">
                            <option value="">-- Select scan --</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small">Chart type</label>
                        <select class="form-select" id="reportChartType" onchange="updateReportChart()">
                            <option value="bar">Bar</option>
                            <option value="line">Line</option>
                            <option value="doughnut">Doughnut</option>
                        </select>
                    </div>
                </div>
                <div class="mt-3">
                    <canvas id="reportChart" height="100"></canvas>
                    <p class="small text-muted mt-2 mb-0" id="chartHint">Select project and scan to view chart.</p>
                </div>
            </div>
        </div>

        <!-- View & Download for selected scan -->
        <div class="card mb-4" id="reportActionsCard" style="display:none">
            <div class="card-body">
                <h5 class="card-title mb-3">Report Actions</h5>
                <p class="text-muted small mb-3" id="reportScanInfo"></p>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-outline-primary" onclick="viewReport()">
                        <i class="fas fa-eye me-1"></i>View
                    </button>
                    <div class="dropdown">
                        <button class="btn btn-outline-success dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-download me-1"></i>Download
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="downloadReport('html')">HTML</a></li>
                            <li><a class="dropdown-item" href="#" onclick="downloadReport('pdf')">PDF</a></li>
                            <li><a class="dropdown-item" href="#" onclick="downloadReport('docx')">DOCX</a></li>
                        </ul>
                    </div>
                </div>
                <p class="small text-muted mt-2 mb-0">PDF and DOCX are generated by the local agent. HTML report is available here.</p>
            </div>
        </div>

        <!-- All completed scans -->
        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">All Reports</h5>
                <div id="allReportsList">
                    <div class="text-center py-4 text-muted">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let projects = [];
        let scans = [];
        let reportChart = null;

        function getAuthToken() {
            return localStorage.getItem('auth_token');
        }

        async function loadData() {
            const token = getAuthToken();
            if (!token) { window.location.href = '/'; return; }
            try {
                const [projRes, scanRes] = await Promise.all([
                    fetch('/projects/', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/scans', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                if (projRes.ok) projects = await projRes.json();
                if (scanRes.ok) scans = await scanRes.json();
                renderReportProjectSelect();
                renderAllReports();
            } catch (e) {
                document.getElementById('allReportsList').innerHTML = '<p class="text-danger">Failed to load.</p>';
            }
        }

        function renderReportProjectSelect() {
            const sel = document.getElementById('reportProjectSelect');
            sel.innerHTML = '<option value="">-- Select project --</option>' +
                projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            loadReportScans();
        }

        function loadReportScans() {
            const pid = document.getElementById('reportProjectSelect').value;
            const sel = document.getElementById('reportScanSelect');
            const list = pid ? scans.filter(s => s.project_id === pid) : [];
            sel.innerHTML = '<option value="">-- Select scan --</option>' +
                list.map(s => `<option value="${s.id}">${s.scan_name || s.id} (${s.status})</option>`).join('');
            updateReportChart();
            loadReportActions();
        }

        function updateReportChart() {
            const scanId = document.getElementById('reportScanSelect').value;
            const chartType = document.getElementById('reportChartType').value;
            const hint = document.getElementById('chartHint');
            const canvas = document.getElementById('reportChart');
            if (!scanId) {
                if (reportChart) { reportChart.destroy(); reportChart = null; }
                hint.style.display = 'block';
                return;
            }
            const scan = scans.find(s => s.id === scanId);
            if (!scan) return;
            hint.style.display = 'none';
            const summary = scan.results_summary || {};
            const passed = summary.passed || 0;
            const failed = summary.failed || 0;
            const useResults = (passed > 0 || failed > 0);
            const labels = useResults ? ['Passed', 'Failed'] : ['Total', 'Active', 'Completed'];
            const data = useResults ? [passed, failed] : [1, scan.status === 'running' ? 1 : 0, scan.status === 'completed' ? 1 : 0];
            const colors = useResults ? ['#10b981', '#ef4444'] : ['#4f46e5', '#f59e0b', '#10b981'];
            const ctx = canvas.getContext('2d');
            if (reportChart) reportChart.destroy();
            reportChart = new Chart(ctx, {
                type: chartType,
                data: { labels, datasets: [{ data, backgroundColor: colors }] },
                options: chartType === 'doughnut' ? { responsive: true } : { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        function loadReportActions() {
            const scanId = document.getElementById('reportScanSelect').value;
            const card = document.getElementById('reportActionsCard');
            const info = document.getElementById('reportScanInfo');
            if (!scanId) { card.style.display = 'none'; return; }
            const scan = scans.find(s => s.id === scanId);
            const proj = projects.find(p => p.id === scan?.project_id);
            info.textContent = `${proj?.name || '-'} / ${scan?.scan_name || scanId} - Status: ${scan?.status || '-'}`;
            card.style.display = 'block';
        }

        async function viewReport() {
            const scanId = document.getElementById('reportScanSelect').value;
            if (!scanId) return;
            const token = getAuthToken();
            const r = await fetch(`/api/reports/${scanId}/html`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!r.ok) { alert('Failed to load report'); return; }
            const html = await r.text();
            const w = window.open('', '_blank');
            w.document.write(html);
            w.document.close();
        }

        async function downloadReport(format) {
            const scanId = document.getElementById('reportScanSelect').value;
            if (!scanId) return;
            const token = getAuthToken();
            const url = `/api/reports/${scanId}/download?format=${format}`;
            const r = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            if (format === 'html') {
                const html = await r.text();
                const blob = new Blob([html], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `report_${scanId}.html`;
                a.click();
                URL.revokeObjectURL(a.href);
            } else {
                const j = await r.json();
                alert(j.detail || j.error || 'PDF and DOCX are generated by the local agent. Run the agent to produce them.');
            }
        }

        function renderAllReports() {
            const completed = scans.filter(s => s.status === 'completed' || s.results_count > 0);
            const container = document.getElementById('allReportsList');
            if (completed.length === 0) {
                container.innerHTML = '<p class="text-muted">No reports yet. Run a scan and complete it to see reports.</p>';
                return;
            }
            container.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0">
                        <thead><tr><th>Scan</th><th>Scan ID</th><th>Project</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${completed.map(s => {
                                const p = projects.find(x => x.id === s.project_id);
                                const ts = s.last_completed || s.created_at || '-';
                                return `<tr>
                                    <td>${s.scan_name || s.id}</td>
                                    <td><a href="/scan/${s.id}" class="text-decoration-none text-primary">${s.id}</a></td>
                                    <td>${p?.name || '-'}</td>
                                    <td><span class="badge bg-success">${s.status}</span></td>
                                    <td>${ts ? new Date(ts).toLocaleDateString() : '-'}</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary me-1" onclick="selectScanAndView('${s.id}')">View</button>
                                        <div class="dropdown d-inline">
                                            <button class="btn btn-sm btn-outline-success dropdown-toggle" type="button" data-bs-toggle="dropdown">Download</button>
                                            <ul class="dropdown-menu">
                                                <li><a class="dropdown-item" href="#" onclick="selectScanAndDownload('${s.id}','html')">HTML</a></li>
                                                <li><a class="dropdown-item" href="#" onclick="selectScanAndDownload('${s.id}','pdf')">PDF</a></li>
                                                <li><a class="dropdown-item" href="#" onclick="selectScanAndDownload('${s.id}','docx')">DOCX</a></li>
                                            </ul>
                                        </div>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function selectScanAndView(scanId) {
            const scan = scans.find(s => s.id === scanId);
            if (scan) {
                const projSel = document.getElementById('reportProjectSelect');
                const scanSel = document.getElementById('reportScanSelect');
                projSel.value = scan.project_id;
                loadReportScans();
                setTimeout(() => { scanSel.value = scanId; updateReportChart(); loadReportActions(); viewReport(); }, 100);
            }
        }

        function selectScanAndDownload(scanId, format) {
            const scan = scans.find(s => s.id === scanId);
            if (scan) {
                document.getElementById('reportProjectSelect').value = scan.project_id;
                loadReportScans();
                setTimeout(() => {
                    document.getElementById('reportScanSelect').value = scanId;
                    loadReportActions();
                    downloadReport(format);
                }, 100);
            }
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
