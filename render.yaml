services:
  - type: web
    name: complisense-ai-backend
    env: python
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "10000"
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: complisense
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SECURE_COOKIES
        value: "true"
