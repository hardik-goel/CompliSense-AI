pack_id: "euai_extended"
version: "1.0.0"
jurisdiction: "EU_AI_ACT"
updated: "2026-03-12"
rules:
  - id: EUAI-ART9-RISK-MGMT-001
    clause: "Art.9"
    title: "Risk management system documented and maintained"
    evaluator: "schema_validate"
    inputs:
      file: "compliance/risk_register.yaml"
      schema_file: "schemas/risk_register.schema.json"
      coverage_min: 0.9
    expression: "(schema_valid and coverage >= coverage_min) or (exists and coverage >= 0.5)"
    thresholds:
      pass: 0.9
      partial: 0.5
    severity: "Major"
    evidence:
      collect: ["file_hash", "schema_validation_report"]
    sla:
      warn_ms: 300
      fail_ms: 1000


  - id: EUAI-ART10-DATA-GOV-001
    clause: "Art.10"
    title: "Dataset documentation completeness"
    evaluator: "file_presence"
    inputs:
      file: "data/dataset_card.json"
      required_json_fields:
        - "provenance"
        - "collection_method"
        - "licensing"
        - "known_biases"
        - "preprocessing"
        - "split_stats"
    expression: "exists and missing_fields <= 1"
    thresholds:
      pass: 0.0  # All fields present (missing_fields == 0)
      partial: 2.0  # Allow up to 2 missing fields for partial
    severity: "Critical"
    evidence:
      collect: ["dataset_card_snapshot", "missing_fields_list"]
    sla:
      warn_ms: 300
      fail_ms: 1000


  - id: EUAI-ART11-TECHDOC-001
    clause: "Art.11 / Annex IV"
    title: "Model technical documentation (Annex IV essentials)"
    evaluator: "file_presence"
    inputs:
      file: "model/model_card.json"
      required_json_fields:
        - "intended_purpose"
        - "architecture"
        - "training_data_refs"
        - "eval_metrics"
        - "known_limitations"
        - "release_version"
        - "integration_context"
    expression: "exists and missing_fields <= 2"
    thresholds:
      pass: 0.0  # All fields present
      partial: 2.0  # Allow up to 2 missing fields for partial
    severity: "Critical"
    evidence:
      collect: ["model_card_snapshot", "missing_fields_list"]
    sla:
      warn_ms: 300
      fail_ms: 1000

  - id: EUAI-ART11-TECHDOC-002
    clause: "Art.11 / Annex IV"
    title: "Model technical documentation coverage"
    evaluator: "techdoc_coverage"
    inputs:
      explicit_files:
        - "model/model_card.json"
      implicit_evaluators:
        - "model_introspect"
    thresholds:
      pass: 0.8
      partial: 0.4
    expression: "coverage_score >= 0.7"
    severity: "Major"
    sla:
      warn_ms: 300
      fail_ms: 1000

  - id: EUAI-ART13-TRANSPARENCY-001
    clause: "Art.13"
    title: "Transparency and information to users"
    evaluator: "file_presence"
    inputs:
      file: "compliance/transparency_documentation.yaml"
      required_json_fields:
        - "user_notification"
        - "ai_system_identification"
        - "capabilities_limitations"
        - "human_oversight_info"
    expression: "exists and missing_fields <= 2"
    thresholds:
      pass: 0.0
      partial: 2.0
    severity: "Major"
    evidence:
      collect: ["transparency_documentation_snapshot"]
    sla:
      warn_ms: 300
      fail_ms: 1000

  - id: EUAI-ART14-HUMAN-OVERSIGHT-001
    clause: "Art.14"
    title: "Human oversight measures documented"
    evaluator: "file_presence"
    inputs:
