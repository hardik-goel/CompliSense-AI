name: Backend Secrets Smoke Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      MONGO_DB: complisense
      DEFAULT_RULEPACK_ID: dpdp_india_core_v1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        run: |
          test -n "$MONGO_URI" || (echo "Missing GitHub secret: MONGO_URI" && exit 1)
          test -n "$JWT_SECRET" || (echo "Missing GitHub secret: JWT_SECRET" && exit 1)
          test -n "$ADMIN_API_TOKEN" || (echo "Missing GitHub secret: ADMIN_API_TOKEN" && exit 1)

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start backend
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          echo $! > uvicorn.pid
          sleep 5

      - name: Check health endpoint
        run: curl --fail http://127.0.0.1:8000/api/health

      - name: Stop backend
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi
